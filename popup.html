<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motivation Check</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px; max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px; color: #1a1a1a;
      overflow-y: auto;
    }
    header {
      display: flex; align-items: center; gap: 8px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #eee;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    header span { font-size: 20px; }
    .stats { padding: 10px 16px; background: #f8f9fa; font-size: 12px; color: #666; }
    #list { padding: 8px 16px 16px; }
    .entry {
      padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }
    .entry:last-child { border-bottom: none; }
    .entry-site { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .entry-motivation { color: #555; margin-bottom: 4px; line-height: 1.4; }
    .entry-time { font-size: 11px; color: #999; }
    .empty {
      text-align: center; padding: 40px 16px; color: #999;
    }
    .empty p { margin-top: 4px; }
    .actions {
      display: flex; gap: 8px; justify-content: flex-end;
      padding: 0 16px 12px;
    }
    .actions button {
      padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px;
      background: #fff; color: #888; font-size: 11px; cursor: pointer;
    }
    .actions button:hover { background: #f5f5f5; }
    #export-btn { color: #4a6cf7; border-color: #4a6cf7; }
    #export-btn:hover { background: #eef1ff; }
  </style>
</head>
<body>
  <header>
    <span>🧠</span>
    <h1>Intention</h1>
  </header>
  <div class="stats" id="stats">Loading...</div>
  <div id="list"><div class="empty">No entries yet.</div></div>
  <div class="actions">
    <button id="export-btn">Export CSV</button>
    <button id="clear-btn">Clear all</button>
    <button id="settings-btn">Settings</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
