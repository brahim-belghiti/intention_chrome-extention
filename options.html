<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Intention Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 32px; max-width: 480px; margin: 0 auto;
      font-size: 14px; color: #1a1a1a;
    }
    h1 { font-size: 22px; margin-bottom: 24px; }
    .setting {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid #eee;
    }
    .setting:last-child { border-bottom: none; }
    .setting-info { flex: 1; }
    .setting-label { font-weight: 600; }
    .setting-desc { font-size: 12px; color: #888; margin-top: 2px; }
    input[type="checkbox"] {
      width: 18px; height: 18px; cursor: pointer;
      accent-color: #4a6cf7;
    }
    .badge {
      display: inline-block; font-size: 11px; padding: 1px 8px;
      border-radius: 10px; background: #eef1ff; color: #4a6cf7;
      margin-left: 6px; font-weight: 500;
    }
    .saved-msg {
      display: none; font-size: 12px; color: #22a67e;
      margin-top: 16px;
    }
    .saved-msg.visible { display: block; }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="setting">
    <input type="checkbox" id="writingRequired">
    <div class="setting-info">
      <div class="setting-label">
        Require intention writing
        <span class="badge">25 character minimum</span>
      </div>
      <div class="setting-desc">
        When off, submitting with any text is allowed.
      </div>
    </div>
  </div>

  <div class="saved-msg" id="savedMsg">Settings saved.</div>
  <script src="options.js"></script>
</body>
</html>
